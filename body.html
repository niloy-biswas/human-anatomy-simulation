<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>মানব শরীর — 3D অ্যানাটমি</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Three.js via importmap -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/"
    }
  }
  </script>

  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="body-viewer-page theme-dark">

  <!-- ═══ DESKTOP NAV ═══ -->
  <nav class="nav-desktop" role="navigation" aria-label="প্রধান নেভিগেশন">
    <div class="nav-inner">
      <a href="/heart" class="nav-logo" aria-label="Origin Labs হোম">
        <img src="https://cdn.10minuteschool.com/images/svg/Origin%20Labs.svg" alt="" aria-hidden="true" style="height:30px;width:auto;display:block;" />
      </a>

      <div class="nav-search" id="navSearch">
        <div class="nav-search-bar">
          <span class="nav-search-icon">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.4"/>
              <path d="M10.5 10.5L13.5 13.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
            <span class="nav-search-spark" aria-hidden="true">✦</span>
          </span>
          <input type="text" class="nav-search-input" id="searchInput"
                 placeholder="সার্চ করুন... / Search anatomy..." autocomplete="off" />
        </div>
        <div class="nav-search-dropdown" id="searchDropdown" hidden></div>
      </div>
      <button class="nav-feedback-btn feedback-open" aria-label="তোমার মতামত জানাও">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <path d="M2 2h10a1 1 0 0 1 1 1v6a1 1 0 0 1-1 1H8l-3 2v-2H2a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
        </svg>
        <span class="nav-feedback-text">তোমার মতামত জানাও</span>
      </button>
    </div>
  </nav>

  <!-- ═══ MOBILE HEADER ═══ -->
  <header class="header-mobile" role="banner">
    <div class="header-mobile-inner">
      <a href="/heart" class="header-mobile-logo" aria-label="Origin Labs হোম">
        <img src="https://cdn.10minuteschool.com/images/svg/Origin%20Labs.svg" alt="" aria-hidden="true" style="height:28px;width:auto;max-width:min(160px,42vw);display:block;object-fit:contain;object-position:left center;" />
      </a>
      <div class="header-mobile-title">
        <span class="header-mobile-name">মানব শরীর</span>
        <span class="header-mobile-sub">Full Body 3D Anatomy</span>
      </div>
      <button class="header-mobile-search-btn feedback-open" aria-label="তোমার মতামত জানাও">
        <svg width="16" height="16" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <path d="M2 2h10a1 1 0 0 1 1 1v6a1 1 0 0 1-1 1H8l-3 2v-2H2a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="header-mobile-search-btn" id="mobileSearchBtn" aria-label="সার্চ করুন">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <circle cx="8" cy="8" r="5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M12 12L15 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Mobile search overlay -->
  <div class="mobile-search-overlay" id="mobileSearchOverlay" hidden>
    <div class="nav-search mobile-search-inner" id="navSearchMobile">
      <div class="nav-search-bar">
        <span class="nav-search-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.4"/>
            <path d="M10.5 10.5L13.5 13.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <span class="nav-search-spark" aria-hidden="true">✦</span>
        </span>
        <input type="text" class="nav-search-input" id="searchInputMobile"
               placeholder="সার্চ করুন..." autocomplete="off" />
        <button class="mobile-search-close" id="mobileSearchClose" aria-label="বন্ধ করুন">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <path d="M2 2L12 12M12 2L2 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="nav-search-dropdown" id="searchDropdownMobile" hidden></div>
    </div>
  </div>

  <!-- ═══ BODY VIEWER LAYOUT ═══ -->
  <div class="bv-layout">

    <!-- System Toggle Sidebar -->
    <aside class="bv-sidebar" id="bvSidebar" role="complementary" aria-label="অ্যানাটমি সিস্টেম">
      <div class="bv-sidebar-header">
        <span class="bv-sidebar-title-bn">অঙ্গতন্ত্র</span>
        <span class="bv-sidebar-title-en">Organ Systems</span>
      </div>

      <div class="bv-system-list" id="systemList">
        <!-- Injected by body.js -->
      </div>

      <!-- Organ viewer links -->
      <details class="bv-organ-section" id="organSection" open>
        <summary class="bv-organ-toggle">
          <span class="bv-organ-toggle-label">
            <span class="bv-organ-title-bn">অন্যান্য অঙ্গসমূহ</span>
            <span class="bv-organ-title-en">3D Organ Models</span>
          </span>
          <svg class="bv-organ-chevron" width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
            <path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </summary>
        <div class="bv-organ-grid">
          <a href="/heart" class="bv-organ-card">
            <img src="assets/images/heart.png" alt="" aria-hidden="true" style="height:28px;width:auto;display:block;" />
            <span class="bv-organ-card-bn">হৃদপিণ্ড</span>
            <span class="bv-organ-card-en">Heart</span>
          </a>
        </div>
      </details>

      <div class="bv-sidebar-footer">
        <button class="bv-btn-all" id="btnShowAll">Show all</button>
        <button class="bv-btn-none" id="btnHideAll">Hide all</button>
      </div>
    </aside>

    <!-- 3D Canvas Area -->
    <main class="bv-canvas-wrap" id="bvCanvasWrap">

      <!-- Loading overlay -->
      <div class="bv-loading" id="bvLoading" role="status" aria-live="polite">
        <div class="bv-loading-card">
          <div class="bv-loading-ring" aria-hidden="true">
            <svg viewBox="0 0 50 50">
              <circle cx="25" cy="25" r="20" fill="none" stroke="#1CAB55" stroke-width="3"
                stroke-dasharray="100 26" stroke-linecap="round">
                <animateTransform attributeName="transform" type="rotate"
                  from="0 25 25" to="360 25 25" dur="1s" repeatCount="indefinite"/>
              </circle>
            </svg>
          </div>
          <p class="bv-loading-label">মডেল লোড হচ্ছে…</p>
          <p class="bv-loading-sub">Loading full body model</p>
          <div class="bv-progress-wrap">
            <div class="bv-progress-bar" id="bvProgressBar"></div>
          </div>
          <p class="bv-progress-text" id="bvProgressText">0%</p>
        </div>
      </div>

      <!-- Three.js canvas injected here -->
      <canvas id="bvCanvas"></canvas>

      <!-- Debug HUD (auto-hidden when OK) -->
      <div class="bv-hud" id="bvHud" hidden></div>

      <!-- Interaction hint -->
      <div class="interaction-hint" id="bvHint" aria-hidden="true">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 1.5C7 1.5 9.5 3 9.5 5.5C9.5 7 8.5 8 7 8.5M7 1.5C7 1.5 4.5 3 4.5 5.5C4.5 7 5.5 8 7 8.5M7 1.5V8.5M7 8.5V12.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        ক্লিক করুন · ঘোরান · স্ক্রল করে জুম করুন
      </div>

      <!-- Hover tooltip -->
      <div class="bv-tooltip" id="bvTooltip" hidden></div>

      <!-- Camera controls -->
      <div class="bv-cam-controls" id="bvCamControls">
        <!-- Rotate toggle -->
        <button class="bv-cam-btn bv-cam-rotate" id="btnAutoRotate" title="Auto Rotate">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M2.5 8C2.5 5 5 2.5 8 2.5C10.2 2.5 12.1 3.8 13 5.7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M13.5 8C13.5 11 11 13.5 8 13.5C5.8 13.5 3.9 12.2 3 10.3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M13 3.5L13 6H10.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M3 12.5L3 10H5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <div class="bv-cam-divider"></div>

        <!-- Center / reset -->
        <button class="bv-cam-btn" id="btnResetCam" title="Reset View">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M8 1.5V3M8 13V14.5M1.5 8H3M13 8H14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>

        <div class="bv-cam-divider bv-cam-divider--dpad"></div>

        <!-- D-pad -->
        <div class="bv-cam-dpad">
          <button class="bv-cam-btn bv-cam-up"    id="btnPanUp"    title="Up">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 9.5V2.5M2.5 6L6 2.5L9.5 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <div class="bv-cam-dpad-mid">
            <button class="bv-cam-btn bv-cam-left"  id="btnPanLeft"  title="Left">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M9.5 6H2.5M6 9.5L2.5 6L6 2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button class="bv-cam-btn bv-cam-right" id="btnPanRight" title="Right">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 6H9.5M6 2.5L9.5 6L6 9.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
          <button class="bv-cam-btn bv-cam-down"  id="btnPanDown"  title="Down">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 2.5V9.5M9.5 6L6 9.5L2.5 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>

    </main>

    <!-- Mobile system toggle button -->
    <button class="bv-mobile-systems-btn" id="bvMobileSysBtn" aria-expanded="false" aria-controls="bvSidebar">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="1" y="3" width="14" height="2" rx="1" fill="currentColor"/>
        <rect x="1" y="7" width="10" height="2" rx="1" fill="currentColor"/>
        <rect x="1" y="11" width="12" height="2" rx="1" fill="currentColor"/>
      </svg>
      সিস্টেম
    </button>

  </div>

  <!-- ═══ DETAIL PANEL ═══ -->
  <div class="detail-backdrop" id="detailBackdrop" hidden aria-hidden="true"></div>

  <aside class="detail-panel bv-detail-panel" id="detailPanel"
         role="dialog" aria-modal="true"
         aria-labelledby="detailTitleBn"
         aria-hidden="true" hidden>

    <div class="detail-header">
      <div class="detail-titles">
        <h2 class="detail-title-bn" id="detailTitleBn">—</h2>
        <p  class="detail-title-en" id="detailTitleEn">—</p>
      </div>
      <button class="detail-close" id="detailClose" aria-label="বন্ধ করুন">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div class="detail-divider" aria-hidden="true"></div>

    <!-- System badge -->
    <div class="bv-system-badge" id="detailSystemBadge"></div>

    <div class="detail-body">
      <p class="detail-text-bn" id="detailTextBn">—</p>
      <p class="detail-text-en" id="detailTextEn">—</p>
    </div>

  </aside>

  <script type="module" src="js/body.js"></script>

  <!-- Feedback Modal -->
  <div class="feedback-overlay" id="feedbackOverlay" hidden>
    <div class="feedback-modal">
      <div class="feedback-modal-header">
        <span class="feedback-modal-title">তোমার মতামত জানাও</span>
        <button class="feedback-modal-close" id="feedbackModalClose" aria-label="বন্ধ করুন">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <path d="M2 2L12 12M12 2L2 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="feedback-iframe-wrap">
        <iframe class="feedback-iframe"
                src="https://tally.so/embed/RG87VJ?simulation_name=human-anatomy-simulation&transparentBackground=1"
                frameborder="0" scrolling="yes" allowfullscreen title="মতামত ফর্ম"></iframe>
      </div>
    </div>
  </div>
  <script>
    (function() {
      const overlay = document.getElementById('feedbackOverlay');
      document.querySelectorAll('.feedback-open').forEach(el =>
        el.addEventListener('click', () => { overlay.hidden = false; })
      );
      document.getElementById('feedbackModalClose').addEventListener('click', () => { overlay.hidden = true; });
      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.hidden = true; });
      document.addEventListener('keydown', e => { if (e.key === 'Escape') overlay.hidden = true; });
    })();
  </script>
</body>
</html>
